# =============================================
# FLYHOST — Configuration Nginx complète
# HTTPS + Wildcard SSL + Proxy → Node.js
# =============================================
# PRÉREQUIS :
#   1. Obtenir un certificat wildcard Let's Encrypt :
#      sudo apt install certbot python3-certbot-dns-cloudflare  (si domaine sur Cloudflare)
#      OU avec acme.sh (recommandé pour wildcard) :
#        curl https://get.acme.sh | sh
#        acme.sh --issue --dns dns_cf -d flihost.site -d *.flihost.site
#        acme.sh --install-cert -d flihost.site \
#          --cert-file /etc/nginx/ssl/flihost.site.crt \
#          --key-file /etc/nginx/ssl/flihost.site.key \
#          --fullchain-file /etc/nginx/ssl/flihost.site.fullchain.crt \
#          --reloadcmd "systemctl reload nginx"
#
#   2. Copier ce fichier :
#      sudo cp nginx.conf /etc/nginx/sites-available/flyhost
#      sudo ln -s /etc/nginx/sites-available/flyhost /etc/nginx/sites-enabled/flyhost
#      sudo rm -f /etc/nginx/sites-enabled/default
#      sudo nginx -t && sudo systemctl reload nginx
#
#   3. Définir la variable d'environnement dans le démarrage Node.js :
#      NODE_ENV=production node index.js
# =============================================

# --- Redirect HTTP → HTTPS (domaine principal) ---
server {
    listen 80;
    listen [::]:80;
    server_name flihost.site www.flihost.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Redirect HTTP → HTTPS (tous les sous-domaines) ---
server {
    listen 80;
    listen [::]:80;
    server_name *.flihost.site;

    return 301 https://$host$request_uri;
}

# --- Domaine principal HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flihost.site www.flihost.site;

    ssl_certificate     /etc/nginx/ssl/flihost.site.fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/flihost.site.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Limite upload pour les ZIP
    client_max_body_size 200m;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}

# --- Sous-domaines HTTPS (projets hébergés sur FLYHOST) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.flihost.site;

    ssl_certificate     /etc/nginx/ssl/flihost.site.fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/flihost.site.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Limite upload si les projets hébergés acceptent des fichiers
    client_max_body_size 100m;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
