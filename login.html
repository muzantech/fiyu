<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — FLYHOST</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-dim: rgba(99, 102, 241, 0.1);
            --bg: #eef0f7;
            --surface: rgba(255, 255, 255, 0.75);
            --surface-strong: rgba(255, 255, 255, 0.92);
            --border: rgba(99, 102, 241, 0.18);
            --border-strong: rgba(99, 102, 241, 0.35);
            --text: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --green: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius: 18px;
            --radius-lg: 24px;
            --shadow-sm: 0 8px 20px -8px rgba(99, 102, 241, 0.2);
            --shadow-hover: 0 20px 30px -12px rgba(99, 102, 241, 0.3);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
            line-height: 1.5;
            position: relative;
        }

        /* ========== FOND ANIMÉ ========== */
        .animated-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb1 { width: 600px; height: 600px; background: rgba(99,102,241,0.6); top: -200px; left: -100px; animation-duration: 20s; }
        .orb2 { width: 500px; height: 500px; background: rgba(139,92,246,0.5); bottom: -150px; right: -100px; animation-duration: 28s; animation-delay: -5s; }
        .orb3 { width: 400px; height: 400px; background: rgba(45,212,191,0.5); top: 40%; left: 40%; animation-duration: 22s; animation-delay: -2s; }

        /* ========== ANIMATIONS ========== */
        @keyframes float { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(80px,-60px) scale(1.3);} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes glowPulse { 0%,100%{box-shadow:0 0 5px var(--accent-dim);} 50%{box-shadow:0 0 20px var(--accent),0 0 30px var(--accent-light);} }
        @keyframes zoomIn { from{opacity:0;transform:scale(0.95);} to{opacity:1;transform:scale(1);} }
        @keyframes spin { to{transform:rotate(360deg);} }
        @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        @keyframes slideInRight { from{opacity:0;transform:translateX(30px);} to{opacity:1;transform:translateX(0);} }
        @keyframes slideInLeft { from{opacity:0;transform:translateX(-30px);} to{opacity:1;transform:translateX(0);} }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--accent-dim); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }

        /* ========== TOPBAR ========== */
        .topbar {
            position: fixed;
            top: 0; width: 100%; height: 64px;
            background: #1e1e2e;
            border-top: 3px solid var(--accent);
            z-index: 90;
            display: flex; align-items: center;
            padding: 0 24px;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            animation: slideDown 0.5s ease-out;
        }
        .hamburger {
            background: transparent; border: none;
            width: 42px; height: 42px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 6px; cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            margin-right: 16px;
            flex-shrink: 0;
        }
        .hamburger:hover { background: rgba(255,255,255,0.1); }
        .hamburger span {
            display: block; width: 22px; height: 2px;
            background-color: white; border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .hamburger:hover span { background: var(--accent-light); }
        .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .logo-area { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .logo-mark {
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 16px;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
            animation: glowPulse 3s infinite;
            flex-shrink: 0;
        }
        .logo-text { font-weight: 800; font-size: 18px; color: white; white-space: nowrap; }
        .topbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .avatar-circle {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 15px; color: white;
            cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            flex-shrink: 0;
        }
        .avatar-circle:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }

        /* ========== DRAWER ========== */
        .drawer {
            position: fixed; top: 0; left: 0;
            width: 300px; height: 100vh;
            background: rgba(238,240,247,0.97);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            box-shadow: 4px 0 40px rgba(99,102,241,0.15);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto; overflow-x: hidden;
            padding: 0; display: flex; flex-direction: column;
        }
        .drawer.open { transform: translateX(0); }
        .drawer-header {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 20px 20px 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .drawer-logo { display: flex; align-items: center; gap: 10px; }
        .drawer-logo .logo-mark { width: 36px; height: 36px; font-size: 14px; }
        .drawer-logo span { font-weight: 800; font-size: 18px; color: var(--text); }
        .close-drawer {
            background: transparent; border: none; font-size: 28px;
            color: var(--text-muted); cursor: pointer;
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .close-drawer:hover { color: var(--error); background: rgba(239,68,68,0.1); }

        .drawer-user {
            display: flex; align-items: center; gap: 16px;
            padding: 20px; border-bottom: 1px solid var(--border);
        }
        .drawer-avatar {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 22px; color: white;
            flex-shrink: 0;
        }
        .drawer-user-info { flex: 1; min-width: 0; }
        .drawer-username { font-weight: 700; font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drawer-coins { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--warning); font-weight: 600; margin: 4px 0; }
        .drawer-role-badge {
            display: inline-block; padding: 3px 10px; border-radius: 30px;
            font-size: 11px; font-weight: 700;
            background: var(--accent-dim); color: var(--accent);
        }
        .drawer-role-badge.admin { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .drawer-role-badge.superadmin { background: rgba(239,68,68,0.1); color: #ef4444; }

        .drawer-nav { flex: 1; padding: 16px 12px; }
        .nav-section { margin: 20px 0 8px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .nav-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 16px; border-radius: 12px;
            color: var(--text-secondary); text-decoration: none;
            font-weight: 600; font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer; margin-bottom: 2px;
            position: relative; overflow: hidden;
        }
        .nav-item::before {
            content: ''; position: absolute; left: 0; top: 0;
            height: 100%; width: 3px; background: var(--accent);
            transform: scaleY(0); transition: transform 0.3s ease;
        }
        .nav-item:hover::before, .nav-item.active::before { transform: scaleY(1); }
        .nav-item i { width: 20px; font-size: 16px; color: var(--accent); transition: all 0.3s ease; }
        .nav-item:hover i { transform: scale(1.2); }
        .nav-item:hover { background: var(--accent-dim); color: var(--accent); }
        .nav-item.active { background: var(--accent); color: white; }
        .nav-item.active i { color: white; }

        .drawer-footer { padding: 20px; border-top: 1px solid var(--border); }
        .drawer-stats { display: flex; justify-content: space-between; text-align: center; margin-bottom: 20px; }
        .stat-item { flex: 1; }
        .stat-item .value { font-weight: 800; font-size: 18px; color: var(--accent); display: block; line-height: 1.3; }
        .stat-item .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        .logout-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; width: 100%; padding: 14px; border-radius: 30px;
            background: rgba(239,68,68,0.1); border: none;
            color: var(--error); font-weight: 700; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }

        /* ========== OVERLAY ========== */
        .drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 199; display: none; opacity: 0; transition: opacity 0.3s;
        }
        .drawer-overlay.active { display: block; opacity: 1; }

        /* ========== MAIN CONTENT ========== */
        .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; width: 100%; }

        /* ========== TABLES — TOUJOURS SCROLLABLES ========== */
        .table-container,
        .table-responsive,
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 100%;
        }
        .table-container table,
        .table-responsive table,
        .table-wrapper table {
            min-width: 600px;
            width: 100%;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }

        /* ========== RESPONSIVE ========== */

        /* Tablette large */
        @media (max-width: 1200px) {
            .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; width: 100%; }
        }

        /* Tablette */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .quick-actions { grid-template-columns: repeat(3, 1fr) !important; }
            .servers-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .power-controls { grid-template-columns: repeat(2, 1fr) !important; }
            .card-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
            .grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
            table { font-size: 13px; }
        }

        /* Mobile (768px) */
        @media (max-width: 768px) {
            .topbar { padding: 0 14px; gap: 8px; }
            .logo-text { display: none; }
            .topbar-right { gap: 8px; }
            .drawer { width: min(300px, 85vw); }
            .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; width: 100%; }

            /* Grilles */
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
            .quick-actions { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
            .servers-grid { grid-template-columns: 1fr !important; }
            .power-controls { grid-template-columns: repeat(2, 1fr) !important; }
            .card-grid { grid-template-columns: 1fr !important; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr !important; }

            /* Flex */
            .section-header { flex-wrap: wrap; gap: 10px; }
            .server-header { flex-direction: column; align-items: flex-start !important; gap: 10px; }
            .server-actions { grid-template-columns: 1fr 1fr !important; }
            .profile-grid { grid-template-columns: 1fr !important; }
            .info-grid { grid-template-columns: 1fr !important; }
            .form-row { flex-direction: column !important; gap: 12px !important; }
            .form-grid { grid-template-columns: 1fr !important; }
            .btn-group { flex-direction: column !important; width: 100% !important; }
            .btn-group .btn { width: 100% !important; justify-content: center; }

            /* Filtres */
            .filter-row, .filters-bar, .filter-bar, .filters {
                flex-direction: column !important;
                gap: 8px !important;
                align-items: stretch !important;
            }
            .filter-select, .filter-input { width: 100% !important; }
            .search-bar, .search-input { width: 100% !important; }

            /* Tables — renforcement mobile */
            .table-container,
            .table-responsive,
            .table-wrapper {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch !important;
                display: block !important;
                width: 100% !important;
            }
            table { font-size: 12px !important; }
            th, td { padding: 8px 10px !important; white-space: nowrap; }
            .table-actions { display: flex; gap: 4px; }

            /* Modals */
            .modal-content {
                width: 96% !important; max-width: 96vw !important;
                padding: 16px !important; margin: 8px auto;
                max-height: 92vh; overflow-y: auto;
            }
            .modal-actions { flex-direction: column !important; gap: 8px !important; }
            .modal-actions .btn { width: 100% !important; justify-content: center; }
            .modal-header h3 { font-size: 16px !important; }

            /* Cards */
            .card { padding: 16px !important; border-radius: 16px !important; }

            /* Onglets */
            .tabs, .admin-tabs, .modal-tabs {
                overflow-x: auto !important; -webkit-overflow-scrolling: touch;
                flex-wrap: nowrap !important; padding-bottom: 4px;
                scrollbar-width: none;
            }
            .tabs::-webkit-scrollbar, .admin-tabs::-webkit-scrollbar { display: none; }
            .tab-btn, .tab { flex-shrink: 0 !important; }

            /* Pages spécifiques */
            .file-toolbar { flex-direction: column !important; gap: 8px !important; }
            .file-path { width: 100% !important; }
            .file-grid { grid-template-columns: 1fr !important; }
            .terminal { font-size: 12px !important; }
            .action-card { padding: 14px 8px !important; }
            .action-card i { font-size: 20px !important; }
            .action-card span { font-size: 12px !important; }
            h1 { font-size: clamp(20px, 6vw, 36px) !important; }
            h2 { font-size: clamp(16px, 5vw, 24px) !important; }

            /* Résolution boutons sélection + export */
            .selection-actions, .export-bar {
                flex-direction: row !important;
                flex-wrap: wrap !important;
                gap: 8px !important;
            }
        }

        /* Petit mobile (480px) */
        @media (max-width: 480px) {
            .topbar { padding: 0 10px; }
            .hamburger { margin-right: 10px; }
            .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; width: 100%; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
            .quick-actions { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
            .card { padding: 12px !important; border-radius: 14px !important; }
            .section-header h2 { font-size: 15px !important; }
            .modal-content { padding: 12px !important; }
            .btn { padding: 10px 14px !important; font-size: 13px !important; }
            .drawer { width: 88vw; }
            .drawer-stats .value { font-size: 15px !important; }
            th, td { padding: 6px 8px !important; font-size: 11px !important; }
        }

        /* Très petit (360px) */
        @media (max-width: 360px) {
            .logo-mark { width: 34px; height: 34px; font-size: 13px; }
            .avatar-circle { width: 32px; height: 32px; font-size: 13px; }
            .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; width: 100%; }
            .drawer { width: 92vw; }
        }

        /* ========== STYLES SPÉCIFIQUES ========== */
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
            display:flex;
            
         align-items:center; justify-content:center; min-height:100vh;}


        
        .nav-links a {
            padding: 7px 14px;
            border-radius: 9px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-login {
            padding: 8px 18px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            background: none;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
        }
        .btn-login:hover { background: white; color: var(--text); }
        .btn-cta {
            padding: 8px 18px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            color: white;
            background: var(--accent);
            border: none;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-cta:hover { background: #5254d4; transform: translateY(-2px); }

        
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 5%;
            position: relative;
            z-index: 5;
            flex: 1;
        }

        
        .auth-card {
            max-width: 480px;
            margin: 40px auto;
            background: var(--surface-strong);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-lg);
            padding: 36px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
        }
        .auth-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.8px;
            color: var(--text);
            margin: 10px 0 6px;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .bonus-info {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 13px;
            color: #d97706;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
        }
        .bonus-info i { font-size: 14px; }

        
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: white;
            border: 1px solid var(--border-strong);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-dim);
        }
        .form-control.invalid {
            border-color: #ef4444;
        }

        .password-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: var(--accent); }

        .password-strength {
            margin-top: 6px;
            height: 6px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .strength-weak { background: #ef4444; width: 25%; }
        .strength-medium { background: #f59e0b; width: 50%; }
        .strength-good { background: #3b82f6; width: 75%; }
        .strength-strong { background: var(--green); width: 100%; }

        .password-requirements {
            font-size: 12px;
            margin-top: 6px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            color: var(--text-secondary);
        }
        .requirement {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .requirement i { font-size: 8px; }
        .requirement.met { color: var(--green); }
        .requirement.unmet { color: var(--text-muted); }

        .recaptcha-placeholder {
            margin: 20px 0 12px;
            display: flex;
            justify-content: center;
        }
        .recaptcha-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        
        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 18px rgba(99, 102, 241, 0.35);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-primary:hover { background: #5254d4; transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            font-family: inherit;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            margin-top: 12px;
        }
        .btn-secondary:hover { background: white; transform: translateY(-2px); }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .auth-links {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }
        .auth-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-links a:hover { text-decoration: underline; }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #b91c1c;
        }
        .alert-success {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
        }
        .alert-warning {
            background: #fef9c3;
            border: 1px solid #fde047;
            color: #854d0e;
        }

        .success-checkmark {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
        }
        .check-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid var(--green);
            position: relative;
            animation: zoomIn 0.5s ease-out;
        }
        .check-icon::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 36px;
            border-right: 4px solid var(--green);
            border-bottom: 4px solid var(--green);
            top: 6px;
            left: 20px;
            transform: rotate(45deg);
            animation: checkmark 0.5s ease-out;
        }
        
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes checkmark {
            from { width: 0; height: 0; opacity: 0; }
            to { width: 18px; height: 36px; opacity: 1; }
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border);
            background: rgba(238, 240, 247, 0.3);
            backdrop-filter: blur(8px);
        }

        @media (max-width: 768px) {
            
            .auth-card { padding: 24px; margin: 20px; }
            .password-requirements { grid-template-columns: 1fr; }
        }
    
    </style>
</head>
<body>
    <!-- FOND ANIMÉ -->
    <div class="animated-bg">
        <div class="gradient-orb orb1"></div>
        <div class="gradient-orb orb2"></div>
        <div class="gradient-orb orb3"></div>
    </div>

    <!-- TOPBAR -->
    

    <!-- OVERLAY -->
    

    <!-- DRAWER -->

    <!-- NAVBAR (identique index.html) -->
    <div class="page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="bonus-info">
                    <i class="fas fa-gift"></i> +10 coins pour votre premier déploiement !
                </div>
                <h1>Connexion</h1>
                <p>Accédez à votre espace FLYHOST</p>
            </div>

            <form id="login-form">
                <div id="global-alert" class="alert" style="display: none;"></div>

                <div class="form-group">
                    <label class="form-label">Adresse email</label>
                    <input type="email" class="form-control" id="email" placeholder="exemple@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Mot de passe
                        <button type="button" class="password-toggle" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>

                <div class="auth-links">
                    <a href="/forgot-password">Mot de passe oublié ?</a><br>
                    <span style="color: var(--text-muted);">Pas encore de compte ?</span>
                    <a href="/register">Inscrivez-vous</a>
                </div>
            </form>

            <!-- Animation succès (cachée par défaut) -->
            <div class="success-checkmark" id="success-checkmark" style="display: none;">
                <div class="check-icon"></div>
            </div>
        </div>
    </div>

    

    <script>
        // ========== FONCTIONNALITÉS RÉELLES basées sur index.js ==========
        document.addEventListener('DOMContentLoaded', () => {
            // Redirection si déjà connecté
            if (localStorage.getItem('flyhost_token')) {
                window.location.href = '/dashboard';
            }

            // Toggle affichage mot de passe
            document.getElementById('toggle-password').addEventListener('click', function () {
                const password = document.getElementById('password');
                const icon = this.querySelector('i');
                if (password.type === 'password') {
                    password.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    password.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });

            // Gestion soumission formulaire
            document.getElementById('login-form').addEventListener('submit', handleLogin);
        });

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const alertDiv = document.getElementById('global-alert');
            const submitBtn = document.getElementById('submit-btn');

            // Validation rapide
            if (!email || !password) {
                showAlert('Veuillez remplir tous les champs.', 'error');
                return;
            }

            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.classList.add('btn-loading');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Stockage des infos
                    localStorage.setItem('flyhost_token', data.token);
                    localStorage.setItem('flyhost_user', JSON.stringify(data.user));

                    // Afficher succès
                    document.getElementById('success-checkmark').style.display = 'block';
                    showAlert('Connexion réussie ! Redirection...', 'success');

                    // Redirection après 1.5s
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    // Gestion des erreurs spécifiques (compte banni, email non vérifié, etc.)
                    if (data.code === 'EMAIL_NOT_VERIFIED') {
                        showAlert('Email non vérifié. Vous allez être redirigé.', 'warning');
                        setTimeout(() => {
                            window.location.href = '/email-verification?email=' + encodeURIComponent(email);
                        }, 2000);
                    } else if (data.code === 'ACCOUNT_BANNED') {
                        showAlert('Compte suspendu. Contactez le support.', 'error');
                    } else if (data.code === 'ACCOUNT_BANNED_PERMANENT') {
                        showAlert('Compte banni définitivement.', 'error');
                    } else {
                        showAlert(data.error || 'Erreur de connexion.', 'error');
                    }
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('btn-loading');
                }
            } catch (error) {
                console.error('Erreur réseau:', error);
                showAlert('Erreur de connexion au serveur.', 'error');
                submitBtn.disabled = false;
                submitBtn.classList.remove('btn-loading');
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('global-alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'flex';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
    
        // ========== DRAWER / SIDEBAR ==========
        function toggleSidebar() {
            const drawer = document.getElementById('drawer');
            if (drawer.classList.contains('open')) { closeSidebar(); } else { openSidebar(); }
        }
        function openSidebar() {
            document.getElementById('drawer').classList.add('open');
            document.getElementById('drawerOverlay').classList.add('active');
            document.getElementById('hamburgerBtn').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('active');
            document.getElementById('hamburgerBtn').classList.remove('open');
            document.body.style.overflow = '';
        }
        window.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeSidebar(); });

        // Chargement infos utilisateur dans le drawer
        (function() {
            try {
                const user = JSON.parse(localStorage.getItem('flyhost_user') || '{}');
                if (user.username) {
                    const init = user.username.charAt(0).toUpperCase();
                    const a1 = document.getElementById('topbarAvatar');
                    const a2 = document.getElementById('drawerAvatar');
                    if (a1) a1.textContent = init;
                    if (a2) a2.textContent = init;
                    const un = document.getElementById('drawerUsername');
                    if (un) un.textContent = user.username;
                    const co = document.getElementById('drawerCoins');
                    if (co) co.textContent = user.coins || 0;
                    const ro = document.getElementById('drawerRole');
                    if (ro) {
                        ro.textContent = user.role === 'superadmin' ? 'Super Admin' : user.role === 'admin' ? 'Admin' : 'Utilisateur';
                        ro.className = 'drawer-role-badge' + (user.role ? ' ' + user.role : '');
                    }
                }
                // Highlight active page
                const page = window.location.pathname.replace('/', '').split('/')[0] || 'dashboard';
                document.querySelectorAll('.nav-item[data-page]').forEach(function(el) {
                    if (el.dataset.page === page) el.classList.add('active');
                    else el.classList.remove('active');
                });
            } catch(e) {}
        })();

        if (typeof logout === 'undefined') {
            function logout() {
                localStorage.removeItem('flyhost_token');
                localStorage.removeItem('flyhost_user');
                window.location.href = '/login';
            }
        }
</script>
</body>
</html>
