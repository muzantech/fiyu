<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factures - FLYHOST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--accent:#6366f1;--accent-light:#818cf8;--bg:#eef0f7;--surface:rgba(255,255,255,0.85);--surface-strong:rgba(255,255,255,0.96);--border:rgba(99,102,241,0.18);--text:#0f172a;--text-secondary:#334155;--text-muted:#64748b;--green:#10b981;--warning:#f59e0b;--error:#ef4444;--radius:16px;--shadow:0 8px 24px -8px rgba(99,102,241,0.18)}
        [data-theme="dark"]{--bg:#0d1117;--surface:rgba(22,27,34,0.85);--surface-strong:rgba(30,37,48,0.95);--border:rgba(99,102,241,0.25);--text:#f0f6fc;--text-secondary:#c9d1d9;--text-muted:#8b949e}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .animated-bg{position:fixed;inset:0;z-index:-2;background:var(--bg)}
        .animated-bg::before{content:'';position:absolute;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,rgba(99,102,241,0.12) 0%,transparent 70%);animation:pulse 8s ease-in-out infinite}
        @keyframes pulse{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.1) translate(5%,3%)}}

        .topbar{background:var(--surface-strong);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
        .topbar-left{display:flex;align-items:center;gap:16px}
        .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .back-btn{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:14px;text-decoration:none;padding:8px 14px;border-radius:50px;border:1px solid var(--border);transition:all 0.2s}
        .back-btn:hover{color:var(--text);border-color:var(--accent)}
        .user-badge{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:14px;font-weight:600}

        .container{max-width:960px;margin:0 auto;padding:32px 20px}
        .page-header{margin-bottom:28px}
        .page-title{font-size:26px;font-weight:800}
        .page-title span{color:var(--accent)}
        .page-sub{color:var(--text-muted);font-size:14px;margin-top:4px}

        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
        .stat-card{background:var(--surface-strong);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
        .stat-card .label{font-size:13px;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .stat-card .value{font-size:26px;font-weight:800;color:var(--text)}
        .stat-card .sub{font-size:12px;color:var(--text-muted);margin-top:4px}

        .invoice-list{display:flex;flex-direction:column;gap:12px}
        .invoice-card{background:var(--surface-strong);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:16px;transition:all 0.2s}
        .invoice-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
        .invoice-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
        .invoice-icon.paid{background:rgba(16,185,129,0.12);color:var(--green)}
        .invoice-icon.pending{background:rgba(245,158,11,0.12);color:var(--warning)}
        .invoice-icon.failed{background:rgba(239,68,68,0.12);color:var(--error)}
        .invoice-body{flex:1;min-width:0}
        .invoice-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
        .invoice-meta{font-size:13px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap}
        .invoice-meta span{display:flex;align-items:center;gap:4px}
        .invoice-amount{font-size:18px;font-weight:800;color:var(--text);white-space:nowrap}
        .invoice-actions{display:flex;gap:8px;flex-shrink:0}

        .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;font-size:12px;font-weight:700}
        .badge-green{background:rgba(16,185,129,0.12);color:var(--green)}
        .badge-yellow{background:rgba(245,158,11,0.12);color:var(--warning)}
        .badge-red{background:rgba(239,68,68,0.12);color:var(--error)}
        .badge-gray{background:rgba(100,116,139,0.12);color:var(--text-muted)}

        .btn{padding:8px 16px;border-radius:50px;border:none;cursor:pointer;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;text-decoration:none}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{background:var(--accent-light)}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-outline:hover{border-color:var(--accent);color:var(--accent)}

        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);background:var(--surface-strong);border:1px solid var(--border);border-radius:var(--radius)}
        .empty-state i{font-size:48px;margin-bottom:16px;display:block;opacity:0.4}
        .empty-state h3{font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text)}

        .toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:14px;background:var(--surface-strong);border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:9999;font-size:14px;font-weight:600;display:none;max-width:360px}
        .toast.success{border-left:4px solid var(--green)}
        .toast.error{border-left:4px solid var(--error)}
        .toast.info{border-left:4px solid var(--accent)}

        @media(max-width:600px){.invoice-card{flex-wrap:wrap}.invoice-actions{width:100%}}
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="topbar">
        <div class="topbar-left">
            <div class="logo">✈ FLYHOST</div>
            <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>
        <div class="user-badge">
            <i class="fas fa-user-circle" style="color:var(--accent)"></i>
            <span id="usernameDisplay">Chargement...</span>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Mes <span>Factures</span></h1>
            <p class="page-sub">Historique de vos paiements et reçus téléchargeables</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="label"><i class="fas fa-file-invoice" style="color:var(--accent)"></i> Total factures</div>
                <div class="value" id="statTotal">0</div>
                <div class="sub">Toutes périodes</div>
            </div>
            <div class="stat-card">
                <div class="label"><i class="fas fa-check-circle" style="color:var(--green)"></i> Payées</div>
                <div class="value" id="statPaid">0</div>
                <div class="sub" id="statPaidAmount"></div>
            </div>
            <div class="stat-card">
                <div class="label"><i class="fas fa-coins" style="color:var(--warning)"></i> Total dépensé</div>
                <div class="value" id="statSpent">0</div>
                <div class="sub">En coins FLYHOST</div>
            </div>
        </div>

        <div class="invoice-list" id="invoiceList">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Chargement...</h3>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = window.location.origin;
        let authToken = localStorage.getItem('flyhost_token');
        if (!authToken) window.location.href = '/login';

        async function apiFetch(url, opts = {}) {
            const r = await fetch(API + url, {
                ...opts,
                headers: { 'Authorization': `Bearer ${authToken}`, ...(opts.headers || {}) }
            });
            return r.json();
        }

        function toast(msg, type = 'info') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast ${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3500);
        }

        async function init() {
            try {
                const u = await apiFetch('/api/user/me');
                if (u.success) document.getElementById('usernameDisplay').textContent = u.user.username;
            } catch(_) {}
            await loadInvoices();
        }

        async function loadInvoices() {
            const list = document.getElementById('invoiceList');
            try {
                const d = await apiFetch('/api/invoices');
                const invoices = d.invoices || d || [];

                document.getElementById('statTotal').textContent = invoices.length;
                const paid = invoices.filter(i => i.status === 'paid' || i.paid);
                document.getElementById('statPaid').textContent = paid.length;
                const totalCoins = invoices.reduce((s, i) => s + (parseFloat(i.amount) || parseFloat(i.coins) || 0), 0);
                document.getElementById('statSpent').textContent = totalCoins.toFixed(0) + ' 🪙';

                if (!invoices.length) {
                    list.innerHTML = `<div class="empty-state"><i class="fas fa-file-invoice"></i><h3>Aucune facture</h3><p>Vos paiements apparaîtront ici</p><a href="/payment" class="btn btn-primary" style="margin-top:12px"><i class="fas fa-coins"></i> Acheter des coins</a></div>`;
                    return;
                }

                const statusBadge = s => {
                    if (s === 'paid' || s === true) return '<span class="badge badge-green"><i class="fas fa-check"></i> Payée</span>';
                    if (s === 'pending') return '<span class="badge badge-yellow"><i class="fas fa-clock"></i> En attente</span>';
                    return '<span class="badge badge-gray">Autre</span>';
                };
                const statusIcon = s => (s === 'paid' || s === true) ? 'paid' : 'pending';

                list.innerHTML = invoices.map(inv => `
                    <div class="invoice-card">
                        <div class="invoice-icon ${statusIcon(inv.status || inv.paid)}">
                            <i class="fas fa-file-invoice"></i>
                        </div>
                        <div class="invoice-body">
                            <div class="invoice-title">Facture #${inv.id} — ${escHtml(inv.description || inv.plan_name || 'Paiement FLYHOST')}</div>
                            <div class="invoice-meta">
                                ${statusBadge(inv.status || inv.paid)}
                                <span><i class="fas fa-calendar"></i> ${fmtDate(inv.created_at || inv.paid_at)}</span>
                                ${inv.payment_method ? `<span><i class="fas fa-credit-card"></i> ${inv.payment_method}</span>` : ''}
                            </div>
                        </div>
                        <div class="invoice-amount">${formatAmount(inv)}</div>
                        <div class="invoice-actions">
                            <a href="/api/invoices/${inv.id}/html" target="_blank" class="btn btn-outline" title="Voir la facture">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a href="/api/invoices/${inv.id}/pdf" class="btn btn-primary" title="Télécharger PDF">
                                <i class="fas fa-download"></i> PDF
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                list.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Erreur de chargement</h3><p>${e.message}</p><button class="btn btn-primary" onclick="loadInvoices()" style="margin-top:12px"><i class="fas fa-redo"></i> Réessayer</button></div>`;
            }
        }

        function formatAmount(inv) {
            const amt = parseFloat(inv.amount_eur || inv.amount || inv.coins || 0);
            if (inv.amount_eur) return `${amt.toFixed(2)} €`;
            if (inv.coins || inv.amount_coins) return `${parseInt(inv.coins || inv.amount_coins)} 🪙`;
            if (amt > 0) return `${amt.toFixed(2)} €`;
            return '—';
        }

        function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function fmtDate(d) {
            if (!d) return '—';
            const dt = new Date(d);
            return isNaN(dt) ? d : dt.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
        }

        init();
    </script>
</body>
</html>
